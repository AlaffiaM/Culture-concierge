<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Your AI-powered cultural concierge for discovering wellness, creativity, and elevated experiences across Africa's most dynamic cities — Lagos, Kigali, Nairobi and Abuja." />
    <!-- PWA theme color must match the app background for a seamless splash screen -->
    <meta name="theme-color" content="#F9F7F2" />
    <meta name="application-name" content="Alaffia Cultural Concierge" />

    <!-- Open Graph — controls how the app appears when shared on social media -->
    <meta property="og:title" content="Alaffia Cultural Concierge" />
    <meta property="og:description" content="Discover the soul of African cities through curated wellness, culture, and lifestyle experiences — intelligently tailored for Lagos, Kigali, Nairobi, and Abuja." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://alaffia-concierge.vercel.app" />
    <meta property="og:image" content="https://alaffia-concierge.vercel.app/favicon.svg" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card — preview when shared on X/Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Alaffia Cultural Concierge" />
    <meta name="twitter:description" content="Discover the soul of African cities through curated wellness, culture, and lifestyle experiences — intelligently tailored for Lagos, Kigali, Nairobi, and Abuja." />

    <!-- PWA manifest and icons — enables "Add to Home Screen" on mobile -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Google Fonts — Montserrat for headings, Inter for body text -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet" />

    <!-- Google Analytics 4 — replace G-XXXXXXXXXX with your real measurement ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <!-- Structured Data (JSON-LD) — helps search engines understand the site as a travel business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "Alaffia Cultural Concierge",
      "description": "Curated wellness spots, cultural events, and AI-powered travel itineraries across Lagos, Abuja, Kigali, and Nairobi.",
      "url": "https://alaffia-concierge.vercel.app",
      "areaServed": ["Lagos", "Abuja", "Kigali", "Nairobi"],
      "knowsAbout": ["African culture", "wellness tourism", "travel planning"]
    }
    </script>

    <title>Alaffia Cultural Concierge</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Vite entry point — loads the React app -->
    <script type="module" src="/src/main.jsx"></script>
    <!-- Service worker registration for offline support + PWA -->
    <!-- Skipped in dev (localhost) to avoid caching HTML over JS modules -->
    <script>
      if ('serviceWorker' in navigator && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
        })
      }
    </script>
  </body>
</html>
